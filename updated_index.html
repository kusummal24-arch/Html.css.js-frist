<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CYBER NEURAL — ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00ffff;
  --magenta: #ff00ff;
  --blue: #0066ff;
  --neon-green: #00ff88;
  --orange: #ff6600;
  --bg: #020412;
}

*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
}

html, body {
  overflow-x: hidden; /* Screen hilne se rokne ka sabse zaroori fix */
}

body {
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-y: auto;
  padding: 40px 40px 40px 320px;
  font-family: 'Rajdhani', sans-serif;
  cursor: none;
}

/* ===================== CUSTOM CURSOR ===================== */
#cursor {
  position: fixed;
  width: 12px; height: 12px;
  background: var(--cyan);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px var(--cyan), 0 0 25px var(--cyan);
  transition: transform 0.05s, width 0.2s, height 0.2s;
}
#cursor-ring {
  position: fixed;
  width: 36px; height: 36px;
  border: 1.5px solid rgba(0,255,255,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.12s ease, width 0.2s, height 0.2s, border-color 0.2s;
}

/* ===================== CANVAS BG ===================== */
#bgCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ===================== SCANLINES ===================== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

/* ===================== GLITCH OVERLAY ===================== */
.glitch-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 2;
  pointer-events: none;
  animation: glitchFlash 6s infinite;
  background: transparent;
}
@keyframes glitchFlash {
  0%, 92%, 94%, 96%, 100% { opacity: 0; background: transparent; }
  93% { opacity: 1; background: rgba(0,255,255,0.03); clip-path: inset(30% 0 50% 0); transform: translateX(3px); }
  95% { opacity: 1; background: rgba(255,0,255,0.03); clip-path: inset(60% 0 20% 0); transform: translateX(-3px); }
}

/* ===================== CORNER DECORATIONS ===================== */
.corner {
  position: fixed;
  width: 60px; height: 60px;
  z-index: 10;
  pointer-events: none;
}
.corner-tl { top: 16px; left: 16px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
.corner-tr { top: 16px; right: 16px; border-top: 2px solid var(--magenta); border-right: 2px solid var(--magenta); }
.corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--neon-green); border-left: 2px solid var(--neon-green); }
.corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--orange); border-right: 2px solid var(--orange); }
.corner::before {
  content: '';
  position: absolute;
  width: 6px; height: 6px;
  background: currentColor;
  border-radius: 50%;
  animation: cornerPulse 2s infinite;
}
.corner-tl::before { top: -3px; left: -3px; color: var(--cyan); }
.corner-tr::before { top: -3px; right: -3px; color: var(--magenta); }
.corner-bl::before { bottom: -3px; left: -3px; color: var(--neon-green); }
.corner-br::before { bottom: -3px; right: -3px; color: var(--orange); }
@keyframes cornerPulse {
  0%, 100% { box-shadow: 0 0 4px currentColor; opacity: 1; }
  50% { box-shadow: 0 0 14px currentColor, 0 0 28px currentColor; opacity: 0.7; }
}

/* ===================== HUD STATUS BAR ===================== */
.hud-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: rgba(0,255,255,0.04);
  border-bottom: 1px solid rgba(0,255,255,0.15);
  z-index: 20;
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  color: rgba(0,255,255,0.6);
  letter-spacing: 2px;
}
.hud-bar .blink { animation: textBlink 1.2s step-end infinite; }
@keyframes textBlink { 50% { opacity: 0; } }
.hud-status { display: flex; gap: 20px; align-items: center; }
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--neon-green);
  box-shadow: 0 0 6px var(--neon-green);
  animation: statusPulse 1.5s infinite;
}
@keyframes statusPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ===================== ROBOT ===================== */
.robot {
  position: fixed;
  left: -400px;
  bottom: 30px;
  z-index: 15;
  animation:
    robotEntry 4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
    robotFloat 4s ease-in-out infinite 4s;
  filter: drop-shadow(0 0 18px cyan) drop-shadow(0 0 35px rgba(0,255,255,0.4));
}
@keyframes robotEntry {
  0% { left: -400px; transform: scale(0.3) rotate(-30deg); opacity: 0; }
  50% { left: 80px; transform: scale(1.15) rotate(10deg); opacity: 1; }
  75% { left: 20px; transform: scale(0.95) rotate(-3deg); }
  100% { left: 40px; transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes robotFloat {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  25% { transform: translateY(-12px) rotate(1deg); }
  75% { transform: translateY(-8px) rotate(-1deg); }
}
.eye { animation: blink 3s infinite; transform-origin: center; }
@keyframes blink {
  0%,88%,100% { transform: scaleY(1); }
  93% { transform: scaleY(0.05); }
  96% { transform: scaleY(0.8); }
}
.arm-right { transform-origin: 315px 260px; animation: wave 1.4s ease-in-out infinite; }
@keyframes wave {
  0%, 100% { transform: rotate(0deg); }
  40% { transform: rotate(-22deg); }
  70% { transform: rotate(-8deg); }
}
.hand-glow { animation: glowPulse 1s infinite alternate; }
@keyframes glowPulse {
  from { opacity: 0.3; r: 16; }
  to { opacity: 1; r: 24; }
}
.chest-core { animation: coreRotate 3s linear infinite; transform-origin: 250px 290px; }
@keyframes coreRotate {
  100% { transform: rotate(360deg); }
}

/* ===================== MAIN CONTAINER ===================== */
.container {
  position: relative;
  width: 100%;
  max-width: 440px; /* Responsive fix */
  margin: auto;
  z-index: 10;
  animation: containerEntry 1.2s cubic-bezier(0.34, 1.4, 0.64, 1) 0.5s both, floatBox 6s ease-in-out infinite 2s;
}
@keyframes containerEntry {
  from { opacity: 0; transform: scale(0.7) translateY(40px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes floatBox {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
}

/* Rotating border */
.border-spin {
  position: absolute;
  inset: -3px;
  border-radius: 34px;
  background: conic-gradient(
    from 0deg,
    transparent 0deg,
    var(--cyan) 60deg,
    transparent 120deg,
    var(--magenta) 180deg,
    transparent 240deg,
    var(--neon-green) 300deg,
    transparent 360deg
  );
  animation: spinBorder 3s linear infinite;
  z-index: -1;
}
@keyframes spinBorder { 100% { transform: rotate(360deg); } }

.border-spin2 {
  position: absolute;
  inset: -2px;
  border-radius: 33px;
  background: conic-gradient(
    from 180deg,
    transparent 0deg,
    var(--orange) 60deg,
    transparent 120deg,
    var(--blue) 200deg,
    transparent 280deg
  );
  animation: spinBorder 5s linear infinite reverse;
  z-index: -1;
  opacity: 0.5;
}

.inner-box {
  position: relative;
  background: rgba(2, 4, 18, 0.92);
  border-radius: 30px;
  padding: 38px 35px;
  backdrop-filter: blur(24px);
  box-shadow:
    inset 0 0 40px rgba(0,255,255,0.05),
    inset 0 0 80px rgba(0,0,255,0.05);
  overflow: hidden;
}

/* Inner grid pattern */
.inner-box::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}

/* Corner accents inside box */
.inner-box::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
  animation: topLineScan 3s ease-in-out infinite;
}
@keyframes topLineScan {
  0%, 100% { opacity: 0.4; transform: scaleX(0.5); }
  50% { opacity: 1; transform: scaleX(1); }
}

/* ===================== CONTENT ===================== */
.content { position: relative; z-index: 5; }

/* ===================== TITLE ===================== */
.title-wrap {
  text-align: center;
  margin-bottom: 30px;
  position: relative;
}
.title-wrap::after {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
  margin-top: 14px;
  animation: linePulse 2s ease-in-out infinite;
}
@keyframes linePulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; box-shadow: 0 0 10px var(--cyan); }
}
.subtitle {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  color: var(--neon-green);
  letter-spacing: 5px;
  margin-bottom: 6px;
  animation: subtitleGlow 2s infinite alternate;
}
@keyframes subtitleGlow {
  from { opacity: 0.6; }
  to { opacity: 1; text-shadow: 0 0 8px var(--neon-green); }
}
h1 {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--cyan));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleShine 3s linear infinite, glitchTitle 8s infinite;
}
@keyframes titleShine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
@keyframes glitchTitle {
  0%, 90%, 100% { transform: skewX(0deg); filter: none; }
  92% { transform: skewX(-4deg); filter: hue-rotate(90deg); }
  94% { transform: skewX(4deg); filter: hue-rotate(-90deg); }
  96% { transform: skewX(-1deg); }
}

/* ===================== FORM ===================== */
form { display: flex; flex-direction: column; gap: 0; }

.form-group {
  position: relative;
  margin-bottom: 14px;
  animation: groupEntry 0.6s ease both;
}
.form-group:nth-child(1) { animation-delay: 0.8s; }
.form-group:nth-child(2) { animation-delay: 0.95s; }
.form-group:nth-child(3) { animation-delay: 1.1s; }
.form-group:nth-child(4) { animation-delay: 1.25s; }
.form-group:nth-child(5) { animation-delay: 1.4s; }
.form-group:nth-child(6) { animation-delay: 1.55s; }
@keyframes groupEntry {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

label {
  display: block;
  color: rgba(0,255,255,0.7);
  font-size: 10px;
  font-family: 'Orbitron', monospace;
  letter-spacing: 3px;
  margin-bottom: 7px;
  text-transform: uppercase;
}

.input-wrap {
  position: relative;
}
.input-wrap::before {
  content: '›';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--cyan);
  font-size: 18px;
  opacity: 0.5;
  transition: 0.3s;
  pointer-events: none;
}

input[type="text"],
input[type="tel"],
input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 13px 14px 13px 34px;
  background: rgba(0,255,255,0.03);
  border: 1px solid rgba(0,255,255,0.15);
  border-radius: 12px;
  color: white;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px; /* iOS zoom fix */
  font-weight: 500;
  outline: none;
  transition: all 0.3s ease;
  position: relative;
}
input::placeholder { color: rgba(255,255,255,0.2); font-size: 13px; }

input:focus {
  background: rgba(0,255,255,0.06);
  border-color: var(--cyan);
  box-shadow:
    0 0 0 1px rgba(0,255,255,0.3),
    0 0 20px rgba(0,255,255,0.15),
    inset 0 0 20px rgba(0,255,255,0.03);
  transform: translateX(4px);
}
.input-wrap:focus-within::before { opacity: 1; color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

.input-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  height: 1px; width: 0;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  border-radius: 0 0 12px 12px;
  transition: width 0.4s ease;
}
.input-wrap:focus-within::after { width: 100%; }

/* ===================== GENDER ===================== */
.gender-group {
  display: flex;
  gap: 14px;
  margin-top: 4px;
}
.gender-option {
  flex: 1;
  position: relative;
}
.gender-option input[type="radio"] { display: none; }
.gender-option label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  border: 1px solid rgba(0,255,255,0.15);
  border-radius: 10px;
  cursor: pointer;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  letter-spacing: 2px;
  transition: all 0.3s;
  background: rgba(0,255,255,0.02);
  margin-bottom: 0;
}
.gender-option input:checked + label {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0,255,255,0.08);
  box-shadow: 0 0 12px rgba(0,255,255,0.2);
  text-shadow: 0 0 8px var(--cyan);
}
.gender-option label:hover {
  border-color: rgba(0,255,255,0.4);
  color: rgba(255,255,255,0.8);
}

/* ===================== SUBMIT BUTTON ===================== */
.btn-wrap {
  margin-top: 22px;
  position: relative;
  animation: groupEntry 0.6s ease 1.7s both;
}
.submit-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #fff;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #003366, #006699, #003366);
  background-size: 200% 200%;
  border: 1px solid rgba(0,255,255,0.3);
  transition: all 0.3s;
  animation: btnBgShift 4s ease infinite;
  z-index: 1;
}
@keyframes btnBgShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.submit-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,255,255,0.2), transparent);
  transition: left 0.5s;
}
.submit-btn:hover::before { left: 100%; }
.submit-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,255,255,0.15), rgba(255,0,255,0.15));
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 14px;
}
.submit-btn:hover {
  transform: scale(1.03);
  box-shadow:
    0 0 25px rgba(0,255,255,0.4),
    0 0 50px rgba(0,255,255,0.2),
    0 0 80px rgba(255,0,255,0.15);
  border-color: var(--cyan);
}
.submit-btn:hover::after { opacity: 1; }
.submit-btn:active { transform: scale(0.97); }

.btn-particles {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  pointer-events: none;
  overflow: hidden;
}
.btn-particles span {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--cyan);
  border-radius: 50%;
  animation: btnParticle 2.5s linear infinite;
  opacity: 0;
}
.btn-particles span:nth-child(1) { left: 10%; animation-delay: 0s; }
.btn-particles span:nth-child(2) { left: 30%; animation-delay: 0.5s; }
.btn-particles span:nth-child(3) { left: 50%; animation-delay: 1s; }
.btn-particles span:nth-child(4) { left: 70%; animation-delay: 1.5s; }
.btn-particles span:nth-child(5) { left: 90%; animation-delay: 2s; }
@keyframes btnParticle {
  0% { top: 100%; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { top: -10%; opacity: 0; transform: translateX(20px); }
}

/* ===================== HOLOGRAPHIC SYSTEM STATUS ===================== */
.sys-status {
  display: flex;
  justify-content: space-between;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid rgba(0,255,255,0.1);
  animation: groupEntry 0.6s ease 1.9s both;
}
.sys-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.sys-label {
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  color: rgba(0,255,255,0.4);
  letter-spacing: 2px;
}
.sys-bar {
  width: 50px;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}
.sys-fill {
  height: 100%;
  border-radius: 2px;
  animation: fillPulse 2s ease-in-out infinite;
}
.sys-fill.c { background: var(--cyan); width: 87%; animation-delay: 0s; }
.sys-fill.m { background: var(--magenta); width: 63%; animation-delay: 0.4s; }
.sys-fill.g { background: var(--neon-green); width: 94%; animation-delay: 0.8s; }
@keyframes fillPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 6px currentColor; }
}

/* ===================== FLOATING DATA NODES ===================== */
.data-node {
  position: fixed;
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  color: rgba(0,255,255,0.2);
  letter-spacing: 1px;
  pointer-events: none;
  z-index: 3;
  animation: nodeFloat linear infinite;
}
@keyframes nodeFloat {
  0% { transform: translateY(110vh); opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* ===================== BIG AI WATERMARK ===================== */
.ai-watermark {
  position: fixed;
  right: -20px; top: 50%;
  transform: translateY(-50%) rotate(90deg);
  font-family: 'Orbitron', monospace;
  font-size: 200px;
  font-weight: 900;
  color: transparent;
  -webkit-text-stroke: 1px rgba(0,255,255,0.04);
  pointer-events: none;
  z-index: 2;
  animation: watermarkPulse 8s ease-in-out infinite;
  letter-spacing: -10px;
}
@keyframes watermarkPulse {
  0%, 100% { -webkit-text-stroke: 1px rgba(0,255,255,0.04); }
  50% { -webkit-text-stroke: 1px rgba(255,0,255,0.07); }
}

/* ===================== SUCCESS OVERLAY ===================== */
.success-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(2,4,18,0.97);
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}
.success-overlay.show { opacity: 1; pointer-events: all; }
.success-icon {
  font-family: 'Orbitron', monospace;
  font-size: 80px;
  animation: successPulse 1s ease-in-out infinite;
}
@keyframes successPulse {
  0%, 100% { transform: scale(1); text-shadow: 0 0 30px var(--cyan); }
  50% { transform: scale(1.1); text-shadow: 0 0 60px var(--cyan), 0 0 100px var(--cyan); }
}
.success-text {
  font-family: 'Orbitron', monospace;
  color: var(--cyan);
  font-size: 16px;
  letter-spacing: 6px;
  margin-top: 20px;
  animation: textFlicker 3s infinite;
}
@keyframes textFlicker {
  0%, 96%, 100% { opacity: 1; }
  97% { opacity: 0.3; }
}

/* =========================================================
   === MOBILE OPTIMIZATION (RESPONSIVE DESIGN ADDED HERE) === 
   ========================================================= */
@media screen and (max-width: 900px) {
  body {
    padding: 80px 20px 40px 20px; /* Removes the 320px huge left padding */
    flex-direction: column;
    justify-content: flex-start;
    cursor: auto; /* Show normal touch cursor on mobile */
  }

  .container {
    width: 100%;
    max-width: 400px;
  }

  /* Moves Robot to Top, centers it, and adjusts animation */
  .robot {
    position: relative !important;
    left: auto !important;
    bottom: auto !important;
    transform: scale(0.65) !important;
    margin-bottom: -50px;
    animation: robotFloatMobile 4s ease-in-out infinite !important;
  }

  @keyframes robotFloatMobile {
    0%, 100% { transform: scale(0.65) translateY(0px) rotate(0deg); }
    50% { transform: scale(0.65) translateY(-10px) rotate(1deg); }
  }

  /* Adjusts the HUD Bar for small screens */
  .hud-bar {
    font-size: 7px;
    padding: 0 10px;
    letter-spacing: 1px;
  }
  .hud-status { gap: 8px; }

  /* Tweaks fonts & inner padding */
  .inner-box {

<script>
// === CURSOR (Automatically disabled on Mobile via CSS) ===
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function animateCursor() {
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();
document.querySelectorAll('input, button, label').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(2)';
    ring.style.width = '50px'; ring.style.height = '50px';
    ring.style.borderColor = 'rgba(255,0,255,0.6)';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(1)';
    ring.style.width = '36px'; ring.style.height = '36px';
    ring.style.borderColor = 'rgba(0,255,255,0.5)';
  });
});

// === HUD CLOCK ===
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('hud-time').textContent = h+':'+m+':'+s;
}
setInterval(updateClock, 1000); updateClock();

// === CANVAS — NEURAL NETWORK ===
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

const NODES = [];
const NODE_COUNT = window.innerWidth < 768 ? 25 : 55; // Kam nodes on mobile for performance
for (let i = 0; i < NODE_COUNT; i++) {
  NODES.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    r: Math.random() * 2 + 1,
    pulse: Math.random() * Math.PI * 2
  });
}

function drawNetwork() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const t = Date.now() / 1000;

  // Moving gradient bg
  const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width * 0.8);
  grad.addColorStop(0, 'rgba(0,30,60,0.3)');
  grad.addColorStop(0.5, 'rgba(0,10,30,0.15)');
  grad.addColorStop(1, 'rgba(2,4,18,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Update nodes
  NODES.forEach(n => {
    n.x += n.vx; n.y += n.vy; n.pulse += 0.02;
    if(n.x < 0 || n.x > canvas.width) n.vx *= -1;
    if(n.y < 0 || n.y > canvas.height) n.vy *= -1;
  });

  // Draw connections
  for(let i = 0; i < NODES.length; i++) {
    for(let j = i+1; j < NODES.length; j++) {
      const dx = NODES[i].x - NODES[j].x;
      const dy = NODES[i].y - NODES[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < 150) {
        const alpha = (1 - d/150) * 0.25;
        const hue = (t * 20 + i * 5) % 360;
        ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(NODES[i].x, NODES[i].y);
        ctx.lineTo(NODES[j].x, NODES[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  NODES.forEach((n, i) => {
    const glow = 0.5 + 0.5 * Math.sin(n.pulse);
    const hue = (t * 30 + i * 8) % 360;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r * (1 + glow * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${0.5 + glow * 0.3})`;
    ctx.shadowBlur = 8 * glow;
    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Rain streaks
  for(let i = 0; i < 12; i++) {
    const x = (i / 12 * canvas.width + t * 30 * (i % 3 === 0 ? 1 : i % 3 === 1 ? 0.6 : 0.4)) % canvas.width;
    const y = (t * 80 * (0.5 + i * 0.1) + i * 200) % canvas.height;
    const grad2 = ctx.createLinearGradient(x, y - 200, x, y);
    grad2.addColorStop(0, 'transparent');
    grad2.addColorStop(1, `rgba(0,255,255,${0.08 + (i%3)*0.03})`);
    ctx.strokeStyle = grad2;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y - 200);
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  requestAnimationFrame(drawNetwork);
}
drawNetwork();

// === MOUSE PARALLAX ON ROBOT ===
const robot = document.querySelector('.robot');
document.addEventListener('mousemove', e => {
  // Only apply parallax if screen is wide enough (desktop)
  if (window.innerWidth > 900) {
      const xp = (e.clientX / window.innerWidth - 0.5) * 10;
      const yp = (e.clientY / window.innerHeight - 0.5) * 8;
      robot.style.filter = `drop-shadow(0 0 18px cyan) drop-shadow(${xp*0.5}px ${yp*0.5}px 35px rgba(0,255,255,0.4))`;
  }
});

// === FORM SUBMIT ===
document.getElementById('mainForm').addEventListener('submit', e => {
  e.preventDefault();
  const overlay = document.getElementById('successOverlay');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 3000);
});
</script>
